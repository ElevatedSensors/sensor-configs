substitutions:
  name: bed-presence-template
  friendly_name: Bed Presence Template

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  project:
    name: elevated_sensors.bed_presence
    version: '0.1'

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:

# Allow provisioning Wi-Fi via serial
improv_serial:

wifi:
  # Set up a wifi access point
  ap: {}

# In combination with the `ap` this allows the user
# to provision wifi credentials to the device via WiFi AP.
captive_portal:

dashboard_import:
  package_import_url: github://ElevatedSensors/sensor-configs/bed-presence-v1.yaml
  import_full_config: false


# Sets up Bluetooth LE (Only on ESP32) to allow the user
# to provision wifi credentials to the device.
esp32_improv:
  authorizer: none

# To have a "next url" for improv serial
web_server:

spi:
  clk_pin: GPIO8    # SCK
  mosi_pin: GPIO10  # MOSI
  miso_pin: GPIO9   # MISO

spi_device:
  id: pot
  cs_pin: GPIO5     # D3


binary_sensor:
  - platform: template
    name: "Bed Left Occupied"
    id: bed_left_occupied
    device_class: occupancy
    lambda: |-
      if (id(bed_left_sensor).state < id(trigger_level).state) {
        return true;
      } else {
        return false;
      }
  - platform: template
    name: "Bed Right Occupied"
    id: bed_right_occupied
    device_class: occupancy
    lambda: |-
      if (id(bed_right_sensor).state < id(trigger_level).state) {
        return true;
      } else {
        return false;
      }
sensor:
  - platform: adc
    pin: GPIO3 # A1
    attenuation: 11db
    name: "Bed Left Sensor"
    id: "bed_left_sensor"
    icon: mdi:bed
    update_interval: 0.5s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1
      - or:
          - throttle: 180s
          - delta: 0.02
    on_raw_value:
      - lambda: |-
          if (id(calibrate_left_u).state) {
            // Verify voltage is within x, otherwise increment/decriment
            // Calculate FSR resistance
            uint16_t FSR_R = 10e3/(3.3*x);
          
            // Set a number with this value
            auto call = id(sensor_r_left_occupied).make_call();
            call.set_value(FSR_R);
            call.perform();

            id(read_w0).press();
            id(calibrate_left_u).turn_off();
          } else if (id(calibrate_left_o).state) {
            // Verify voltage is within x, otherwise increment/decriment
            // Calculate FSR resistance
            uint16_t FSR_R = 937.5/(3.3*x);
          
            // Set a number with this value
            auto call = id(sensor_r_left_unoccupied).make_call();
            call.set_value(FSR_R);
            call.perform();

            id(read_w0).press();
            id(calibrate_left_o).turn_off();
          }












  - platform: adc
    pin: GPIO4 # A2
    attenuation: 11db
    name: "Bed Right Sensor"
    id: "bed_right_sensor"
    icon: mdi:bed
    update_interval: 0.5s
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1
      - or:
          - throttle: 180s
          - delta: 0.02


number:
  - platform: template
    name: Bed Trigger Level
    id: trigger_level
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 2.8
    initial_value: 1.4
    step: 0.05
    icon: mdi:arrow-collapse-down
    unit_of_measurement: V
  - platform: template
    name: Sensor Resistance Left (Unoccupied)
    id: sensor_r_left_occupied
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 10e6
    initial_value: 0
    step: 10
    unit_of_measurement: ohms
  - platform: template
    name: Sensor Resistance Left (Occupied)
    id: sensor_r_left_unoccupied
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 10e6
    initial_value: 0
    step: 10
    unit_of_measurement: ohms

button:
  - platform: template
    name: "Increment W0"
    on_press: 
      then:
        - lambda: !lambda |-
            id(pot).enable();
            id(pot).write_byte(0x04);
            id(pot).disable();
            id(read_w0).press();
  - platform: template
    name: "Decrement W0"
    on_press: 
      then:
        - lambda: !lambda |-
            id(pot).enable();
            id(pot).write_byte(0x08);
            id(pot).disable();
            id(read_w0).press();
  - platform: template
    name: "Read W0"
    id: read_w0
    on_press: 
      then:
        - lambda: !lambda |-
            id(pot).enable();
            uint8_t cmd = 0xC;
            id(pot).transfer_byte(cmd);
            uint8_t val = id(pot).transfer_byte(0x00);
            id(pot).disable();

            uint16_t resistance = val*10e3/128;

            ESP_LOGD("custom", "val = %u\tres = %u", val, resistance);

## IDEA
# Create switch that says calibrate x
# set resistance, then 
# for the sensor, on_update (if calibrate_x, call calibrate script)
# Once you get x resistance values close together, disable calibration (set text sensor that says done?)
switch:
  - platform: template
    name: "Calibrate Left (Unoccupied)"
    id: calibrate_left_u
    optimistic: true
    turn_on_action: 
      then:
        - lambda: |-
            //replace with script (set_wiper_v0(10k))
            // Enable
            id(pot).enable();
            // Set resistance to 10k
            //             addr (v wiper 0)    cmd (write)   data (10k ohm)
            uint16_t cmd = 0b0000  << 12     | 0b00 << 10  | 128;
            id(pot).write_byte16(cmd);
            // Disable
            id(pot).disable();  
  - platform: template
    name: "Calibrate Left (Occupied)"
    id: calibrate_left_o
    optimistic: true
    turn_on_action: 
      then:
        - lambda: |-
            //replace with script (set_wiper_v0(937.5))
            // Enable
            id(pot).enable();
            // Set resistance to 
            //             addr (v wiper 0)    cmd (write)   data (937.5 ohm)
            uint16_t cmd = 0b0000  << 12     | 0b00 << 10  | 12;
            id(pot).write_byte16(cmd);
            // Disable
            id(pot).disable();  
  - platform: template
    name: "Calibrate Right (Unoccupied)"
    id: calibrate_right_u
    optimistic: true
  - platform: template
    name: "Calibrate Right (Occupied)"
    id: calibrate_right_o
    optimistic: true
